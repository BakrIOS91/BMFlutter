name: bmflutter
description: "A new Flutter project."
version: 0.0.1
homepage: ""

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking & Connectivity
  http: ^1.6.0
  http_parser: ^4.1.2
  connectivity_plus: ^7.0.0

  # State Management
  flutter_bloc: ^9.1.1

  # Storage & Persistence
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

