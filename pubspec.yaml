  # Platform Utilities
  jailbreak_root_detection: ^1.2.0+1
  root_jailbreak_sniffer: ^1.1.4

  # UI & Framework
  provider: ^6.1.1
  meta: ^1.17.0
  source_gen: ^4.2.0
  build: ^4.0.4
  analyzer: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1